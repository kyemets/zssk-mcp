name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref — keeps PR queue lean without
# blocking a fresh push.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck · build · smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (strict)
        run: npm run typecheck

      - name: Build
        run: npm run build

      # Smoke hits the live ZSSK GTFS feed (≈270 KB). If zsr.sk is down the
      # job will fail — just re-run. We deliberately don't mock the feed; that
      # would defeat the point of catching upstream drift.
      - name: Smoke test
        run: npm run smoke
        env:
          # Force a fresh download so CI doesn't rely on any stale cache shipped
          # into the runner image (there shouldn't be one, but belt and braces).
          ZSSK_GTFS_REFRESH: "1"
